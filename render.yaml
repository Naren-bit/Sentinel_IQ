databases: []

services:
  - type: web
    name: sentineliq-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # You'll set this manually in the Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel URL after deploying frontend
      - key: NODE_ENV
        value: production
